name: Auto-merge autoupdate PRs

on:
  pull_request_target:
    types: [opened, labeled, reopened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'autoupdate')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash, on green CI)
        env:
          GH_TOKEN: ${{ secrets.AUTOUPDATE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
