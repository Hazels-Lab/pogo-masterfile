name: Probe token trigger

# Smoke test: pushes a fresh probe tag matching `typescript-v*` using
# AUTOUPDATE_TOKEN. If AUTOUPDATE_TOKEN can trigger workflows from CI,
# publish-npm.yml will fire on the tag (and fail at the publish step,
# which is fine — we only care about the trigger). If it doesn't fire,
# the token is not configured for workflow triggering.
#
# Run manually: gh workflow run probe-token-trigger.yml
# Cleanup: delete the probe tag afterwards.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.AUTOUPDATE_TOKEN }}
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Push probe tag
        run: |
          probe="typescript-v0.0.998-probe-${GITHUB_RUN_ID}"
          git tag "$probe"
          git push origin "$probe"
          echo "Pushed probe tag: $probe"
          echo "Watch publish-npm.yml — if it fires, AUTOUPDATE_TOKEN can trigger workflows from CI."
