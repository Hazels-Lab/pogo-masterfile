name: Publish Rust Macros

on:
  push:
    tags:
      - "rust-macros-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. rust-macros-v0.1.0)"
        required: true
        type: string

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust-macros
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust-macros
      - run: cargo test
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
