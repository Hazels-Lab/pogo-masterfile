name: Tag releases for bumped packages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: tag-releases
  cancel-in-progress: false

jobs:
  detect-and-tag:
    name: Detect bumps and push release tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.AUTOUPDATE_TOKEN }}
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Backfill version bumps for manual package edits
        run: bun run scripts/backfill-bump.ts

      - name: Push release tags layer-by-layer
        run: bun run scripts/push-release-tags.ts
