name: Publish pogo-masterfile

on:
  push:
    tags:
      - "pogo-masterfile-v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing requires npm >= 11.5.1; Node 20 ships with npm 10.x.
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      # dist/ is gitignored; build it from the committed src/.
      - name: Build ts-api dist
        run: bun run build
        working-directory: packages/ts-api
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/ts-api
