name: Publish pogo-masterfile

on:
  push:
    tags:
      - "pogo-masterfile-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. pogo-masterfile-v0.1.3)"
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing requires npm >= 11.5.1; Node 20 ships with npm 10.x.
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      # dist/ is gitignored; build it from the committed src/.
      - name: Build ts-api dist
        run: bun run build
        working-directory: packages/ts-api
      # `npm publish` does not understand the `workspace:` protocol and would
      # ship `pogo-masterfile-types: workspace:^` literally — breaking installs
      # for every consumer. `bun pm pack` rewrites `workspace:^` to the actual
      # caret-versioned dep against the current workspace, so the tarball is
      # already correct when npm uploads it. Trusted Publishing / OIDC
      # provenance still works because it's attached at `npm publish` time.
      - name: Pack and publish
        working-directory: packages/ts-api
        run: |
          bun pm pack
          npm publish "pogo-masterfile-$(node -p 'require("./package.json").version').tgz" --provenance --access public
