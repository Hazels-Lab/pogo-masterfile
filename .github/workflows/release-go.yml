name: Release Go

on:
  push:
    tags:
      - "packages/go/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. packages/go/v0.1.3)"
        required: true
        type: string

jobs:
  release:
    name: Verify and announce
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: packages/go/go.sum

      - name: Build and test
        working-directory: packages/go
        run: |
          go build ./...
          go vet ./...
          go test ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: |
            Tagged Go module release.

            Install:
            ```
            go get ${{ github.repository }}/packages/go@${{ env.RELEASE_TAG }}
            ```

            Note: proxy.golang.org may take a minute to pick up the new tag. If `go get` reports "no matching versions", retry shortly.
