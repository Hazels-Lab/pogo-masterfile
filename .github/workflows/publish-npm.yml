name: Publish npm

on:
  push:
    tags:
      - "typescript-v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      # packages/ts ships its committed dist/ verbatim — no build step.
      # `bun run check` verifies the dist/ matches its source via tsconfig.build.
      - name: Verify
        run: bun run check
        working-directory: packages/ts
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
