[package]
name = "pogo-masterfile-types"
version = "0.1.17"
edition = "2024"
rust-version = "1.85"
description = "Generated Rust types for the Pokémon GO masterfile, with a typed parse_masterfile dispatcher."
license = "MIT"
authors = ["Hazel's Lab <https://github.com/Hazels-Lab>"]
repository = "https://github.com/Hazels-Lab/pogo-masterfile"
homepage = "https://github.com/Hazels-Lab/pogo-masterfile"
documentation = "https://docs.rs/pogo-masterfile-types"
readme = "README.md"
keywords = ["pokemon-go", "pokemon", "masterfile", "serde", "types"]
categories = ["api-bindings", "data-structures", "game-development"]
include = [
	"src/**/*.rs",
	"examples/**/*.rs",
	"tests/**/*.rs",
	"Cargo.toml",
	"README.md",
	"LICENSE",
	"CHANGELOG.md",
]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pogo-masterfile-macros = { version = "0.1", path = "../rust-macros" }

[features]
default = []
# Opt-in: types for templates that have been removed from upstream GAME_MASTER.json.
# Each type carries a #[deprecated] attribute; expect compile warnings at use sites.
deprecated = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
